<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suno — Contextual Feed Prompt</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#0E0C0B;
  display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
}
.scale-root{transform-origin:center center}
.phone{
  width:300px;height:620px;
  background:#0E0C0B;
  border-radius:44px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 0 1px rgba(0,0,0,0.6),0 40px 80px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.06);
  position:relative;display:flex;flex-direction:column;
}

/* ── STATUS BAR ── */
.status{
  height:46px;padding:13px 18px 0;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10;
}
.status-time{font-size:14px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.dynamic-island{
  width:72px;height:22px;background:#000;border-radius:18px;
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
}
.status-icons{display:flex;align-items:center;gap:4px}

/* ── TOP HEADER ── */
.top-header{
  height:40px;padding:0 14px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10;
}
.page-dots{display:flex;gap:5px;align-items:center}
.dot{width:14px;height:5px;border-radius:3px;background:rgba(255,255,255,0.35)}
.dot.active{background:#fff;width:20px}
.hook-btn{
  display:flex;align-items:center;gap:5px;
  border:1px solid rgba(255,255,255,0.3);border-radius:100px;
  padding:5px 12px;color:#fff;font-size:11px;font-weight:500;
}

/* ── SLIDES AREA ── */
.slides-viewport{
  flex:1;overflow:hidden;position:relative;
}
.slides-track{
  display:flex;flex-direction:column;
  height:100%;
  transition:transform 0.55s cubic-bezier(0.4,0,0.2,1);
}
.slide{
  width:300px;flex-shrink:0;
  height:100%;
  position:relative;display:flex;flex-direction:column;
}

/* ── SONG SLIDE ── */
.song-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:blur(40px) brightness(0.25);
  transform:scale(1.2);
}
.song-content{
  position:relative;z-index:2;
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:0 50px 0 14px;
}
.album-art{
  width:190px;height:190px;border-radius:14px;
  overflow:hidden;background:#2A2520;flex-shrink:0;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
}
.album-art img{width:100%;height:100%;object-fit:cover;display:block}
.album-art-fallback{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
}

/* ── RIGHT ICONS ── */
.right-icons{
  position:absolute;right:12px;bottom:90px;
  display:flex;flex-direction:column;align-items:center;gap:18px;z-index:3;
}
.r-icon{display:flex;flex-direction:column;align-items:center;gap:3px}
.r-icon svg{width:26px;height:26px}
.r-icon-label{font-size:11px;color:rgba(255,255,255,0.8);font-weight:500}

/* ── ARTIST INFO ── */
.artist-info{
  position:absolute;left:14px;bottom:66px;z-index:3;
  max-width:200px;
}
.artist-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.artist-avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,#6B5EA8,#3B8BD4);
  flex-shrink:0;overflow:hidden;
}
.artist-avatar img{width:100%;height:100%;object-fit:cover}
.artist-name{font-size:13px;font-weight:600;color:#fff}
.follow-btn{
  border:1px solid rgba(255,255,255,0.6);border-radius:100px;
  padding:2px 10px;font-size:11px;color:#fff;font-weight:500;
  flex-shrink:0;
}
.song-sub{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:rgba(255,255,255,0.55);
}

/* ── PLAYER BAR ── */
.player-bar{
  position:absolute;left:10px;right:10px;bottom:6px;
  height:52px;border-radius:14px;
  background:rgba(30,28,26,0.92);
  border:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;padding:0 10px;gap:8px;z-index:3;
}
.player-thumb{
  width:36px;height:36px;border-radius:8px;
  background:#2A2520;overflow:hidden;flex-shrink:0;
}
.player-thumb img{width:100%;height:100%;object-fit:cover}
.player-info{flex:1;min-width:0}
.player-title{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-plays{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px}
.player-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.remix-pill{
  display:flex;align-items:center;gap:4px;
  border:1px solid rgba(255,255,255,0.2);border-radius:100px;
  padding:4px 10px;font-size:11px;color:rgba(255,255,255,0.8);
}

/* ── PROMPT SLIDE ── */
.prompt-slide{
  background:#0E0C0B;
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:14px;position:relative;
}
.prompt-card{
  background:#1C1A18;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:22px;padding:24px 20px;
  width:100%;
}
.prompt-listen-row{
  display:flex;align-items:center;gap:-6px;margin-bottom:18px;
}
.prompt-thumb{
  width:36px;height:36px;border-radius:8px;
  background:#2A2520;overflow:hidden;
  border:2px solid #0E0C0B;flex-shrink:0;
}
.prompt-thumb+.prompt-thumb{margin-left:-10px}
.prompt-thumb img{width:100%;height:100%;object-fit:cover}
.prompt-text-block{margin-left:10px}
.prompt-listened{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:2px;letter-spacing:0.04em;text-transform:uppercase}
.prompt-heading{font-size:15px;font-weight:700;color:#fff;line-height:1.3}
.prompt-sub{font-size:12px;color:rgba(255,255,255,0.45);margin-top:4px;line-height:1.45}
.prompt-divider{height:1px;background:rgba(255,255,255,0.07);margin:16px 0}
.prompt-prefill-label{
  font-size:10px;color:rgba(255,255,255,0.35);
  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;
}
.prompt-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
.prompt-tag{
  padding:5px 12px;border-radius:100px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  font-size:12px;color:rgba(255,255,255,0.75);
}
.prompt-cta{
  width:100%;height:44px;border-radius:12px;
  background:#E8693A;border:none;
  font-size:14px;font-weight:700;color:#fff;
  display:flex;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;
}
.prompt-dismiss{
  margin-top:10px;font-size:12px;color:rgba(255,255,255,0.3);
  text-align:center;cursor:pointer;
}

/* ── BOTTOM NAV ── */
.bottom-nav{
  height:56px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-around;
  background:#0E0C0B;
  border-top:1px solid rgba(255,255,255,0.05);
  position:relative;z-index:10;padding-bottom:4px;
}
.nav-icon{display:flex;align-items:center;justify-content:center;width:40px;height:40px}
.nav-create{
  width:46px;height:46px;border-radius:50%;
  background:#E8693A;
  display:flex;align-items:center;justify-content:center;
}

/* ── OVERLAY + ANNOTATION ── */
.screen-overlay{
  position:absolute;inset:0;z-index:40;
  background:rgba(0,0,0,0);
  transition:background 0.45s ease;pointer-events:none;
  border-radius:44px;
}
.screen-overlay.dim{background:rgba(0,0,0,0.65)}
.annotation{
  position:absolute;left:14px;right:14px;bottom:70px;
  z-index:50;opacity:0;
  background:rgba(232,105,58,0.2);
  border:1.5px solid rgba(232,105,58,0.9);
  border-radius:14px;padding:12px 14px;
  font-size:12.5px;line-height:1.5;color:#FFB580;
  text-align:center;font-weight:600;
  box-shadow:0 0 28px rgba(232,105,58,0.2);
  pointer-events:none;
  transition:opacity 0.4s ease;
}
.annotation.visible{opacity:1}

/* ── LIKE ANIMATION ── */
@keyframes likePop{
  0%{transform:scale(1)}
  40%{transform:scale(1.4)}
  70%{transform:scale(0.9)}
  100%{transform:scale(1)}
}
.like-icon.liked{animation:likePop 0.4s ease}

/* ── SWIPE HINT ── */
.swipe-hint{
  position:absolute;bottom:74px;left:50%;transform:translateX(-50%);
  z-index:30;opacity:0;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:opacity 0.3s ease;pointer-events:none;
}
.swipe-hint.visible{opacity:0.5}
.swipe-finger{
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,255,255,0.7);
  animation:swipeUp 0.7s ease infinite;
}
@keyframes swipeUp{
  0%{transform:translateY(0);opacity:0.8}
  100%{transform:translateY(-18px);opacity:0}
}
</style>
</head>
<body>
<div class="scale-root">
<div class="phone">

  <!-- ── DYNAMIC ISLAND ── -->

  <!-- ── STATUS BAR ── -->
  <div class="status">

            <svg viewBox="0 0 26 26" fill="none"><circle cx="7" cy="13" r="1.5" fill="rgba(255,255,255,0.9)"/><circle cx="13" cy="13" r="1.5" fill="rgba(255,255,255,0.9)"/><circle cx="19" cy="13" r="1.5" fill="rgba(255,255,255,0.9)"/></svg>

    </div>
    <div class="nav-icon">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M4 18V8l7-5 7 5v10" stroke="rgba(255,255,255,0.45)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><rect x="8" y="12" width="6" height="6" rx="1" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/></svg>
    </div>
    <div class="nav-icon">
      <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#9B6FDF,#E8693A)"></div>
    </div>
  </div>

  <!-- ── OVERLAY + ANNOTATION ── -->
  <div class="screen-overlay" id="overlay"></div>
  <div class="annotation" id="annot"></div>

</div><!-- /phone -->
</div><!-- /scale-root -->

<script>
function scaleToFit(){
  const s = Math.min(window.innerWidth/300, window.innerHeight/620) * 0.92;
  document.querySelector('.scale-root').style.transform = `scale(${s})`;
}
scaleToFit();
window.addEventListener('resize', scaleToFit);

const track   = document.getElementById('track');
const overlay = document.getElementById('overlay');
const annot   = document.getElementById('annot');
const dots    = [document.getElementById('dot0'),document.getElementById('dot1'),document.getElementById('dot2')];

function delay(ms){ return new Promise(r => setTimeout(r, ms)); }

function goToSlide(i){
  const slideH = document.querySelector('.slides-viewport').offsetHeight;
  track.style.transform = `translateY(-${i * slideH}px)`;
  dots.forEach((d,n) => {
    d.classList.toggle('active', n === i);
    d.style.width = n === i ? '20px' : '14px';
    d.style.background = n === i ? '#fff' : 'rgba(255,255,255,0.35)';
  });
}

function showAnnot(msg){
  overlay.style.transition = 'background 0.4s ease';
  overlay.style.background = 'rgba(0,0,0,0.65)';
  annot.textContent = msg;
  annot.style.transition = 'opacity 0.4s ease';
  annot.style.opacity = '1';
  annot.classList.add('visible');
}
function hideAnnot(){
  return new Promise(r => {
    overlay.style.background = 'rgba(0,0,0,0)';
    annot.style.opacity = '0';
    annot.classList.remove('visible');
    setTimeout(r, 450);
  });
}

async function likeSong1(){
  const heart = document.getElementById('heartPath1');
  const count = document.getElementById('likeCount1');
  const icon  = document.getElementById('like1');
  heart.setAttribute('fill','#FF3B6E');
  count.textContent = '13';
  icon.style.animation = 'none';
  void icon.offsetWidth;
  icon.style.animation = 'likePop 0.4s ease';
}

async function likeSong2(){
  const heart1 = document.getElementById('heartPath1');
  heart1.setAttribute('fill','rgba(255,255,255,0.9)');
  document.getElementById('likeCount1').textContent = '12';
  const heart = document.getElementById('heartPath2');
  const count = document.getElementById('likeCount2');
  const icon  = document.getElementById('like2');
  heart.setAttribute('fill','#FF3B6E');
  count.textContent = '84';
  icon.style.animation = 'none';
  void icon.offsetWidth;
  icon.style.animation = 'likePop 0.4s ease';
}

async function resetAll(){
  track.style.transition = 'none';
  goToSlide(0);
  overlay.style.transition = 'none';
  overlay.style.background = 'rgba(0,0,0,0)';
  annot.style.transition = 'none';
  annot.style.opacity = '0';
  annot.classList.remove('visible');
  const heart1 = document.getElementById('heartPath1');
  heart1.setAttribute('fill','rgba(255,255,255,0.9)');
  document.getElementById('likeCount1').textContent = '12';
  const heart = document.getElementById('heartPath2');
  heart.setAttribute('fill','rgba(255,255,255,0.9)');
  document.getElementById('likeCount2').textContent = '83';
  void overlay.offsetWidth;
}

async function runLoop(){
  await resetAll();
  track.style.transition = '0.55s cubic-bezier(0.4,0,0.2,1)';

  // ── Song 1 ──
  await delay(2200);

  // ── Like Song 1 ──
  await likeSong1();
  await delay(1200);

  // ── Swipe to Song 2 ──
  goToSlide(1);
  await delay(1800);

  // ── Like Song 2 ──
  await likeSong2();
  await delay(2000);

  // ── Swipe to Prompt ──
  goToSlide(2);
  await delay(900);

  // ── Annotation ──
  showAnnot('Parameters pre-filled from my listening history — one tap to start.');
  await delay(2800);
  await hideAnnot();

  await delay(700);
  runLoop();
}

setTimeout(runLoop, 500);
</script>
</body>
</html>
