<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suno — Current Creation Flow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:#0E0C0B;
  display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
}
.scale-root{transform-origin:center center}
.phone{
  width:300px;height:620px;background:#141110;
  border-radius:44px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 0 0 1px rgba(0,0,0,0.6),0 40px 80px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.06);
  position:relative;
}
.screen-overlay{
  position:absolute;inset:0;z-index:15;
  background:rgba(0,0,0,0);
  pointer-events:none;border-radius:44px;
}
.annotation{
  position:absolute;left:16px;right:16px;bottom:108px;
  z-index:25;opacity:0;
  background:rgba(232,105,58,0.2);
  border:1.5px solid rgba(232,105,58,0.9);
  border-radius:14px;padding:14px 16px;
  font-size:13px;line-height:1.55;color:#FFB580;
  text-align:center;font-weight:600;
  box-shadow:0 0 28px rgba(232,105,58,0.25);
  pointer-events:none;
}
.status{
  height:48px;padding:14px 20px 0;
  display:flex;align-items:center;justify-content:space-between;
}
.status-time{font-size:15px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.dynamic-island{
  width:80px;height:26px;background:#000;border-radius:20px;
  position:absolute;top:10px;left:50%;transform:translateX(-50%);
}
.status-icons{display:flex;align-items:center;gap:5px}
.navbar{
  height:52px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
}
.back-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.nav-center{text-align:center}
.nav-title{font-size:16px;font-weight:600;color:#fff;letter-spacing:-0.2px}
.nav-subtitle{font-size:11px;color:rgba(255,255,255,0.4);margin-top:1px}
.model-pill{
  display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,0.1);border-radius:100px;
  padding:5px 10px;color:#fff;font-size:11px;font-weight:500;
}
.content{padding:0 14px;display:flex;flex-direction:column;gap:10px}
.audio-btn{
  height:42px;border-radius:14px;
  background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,0.85);font-size:14px;font-weight:500;
  border:1px solid rgba(255,255,255,0.06);gap:6px;
}
.song-card{
  background:#1E1B1A;border-radius:18px;padding:14px;
  border:1px solid rgba(255,255,255,0.06);
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
}
.card-title{font-size:14px;font-weight:600;color:#fff}
.dice-btn{
  width:30px;height:30px;border-radius:8px;
  background:rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
}
.dice-btn.spinning{animation:diceSpin 0.55s cubic-bezier(0.4,0,0.2,1)}
@keyframes diceSpin{
  0%{transform:rotate(0deg) scale(0.84)}
  50%{transform:rotate(200deg) scale(1.1)}
  100%{transform:rotate(360deg) scale(1)}
}
.text-area{
  min-height:195px;font-size:14px;line-height:1.5;
  color:#fff;position:relative;padding-bottom:12px;
}
.placeholder-text{
  color:rgba(255,255,255,0.28);font-size:14px;line-height:1.5;
  position:absolute;top:0;left:0;right:0;
}
.typed-text{color:#fff;font-size:14px;line-height:1.5;white-space:pre-wrap}
.random-text{
  color:rgba(255,255,255,0.28);font-size:14px;line-height:1.5;
  position:absolute;top:0;left:0;right:0;opacity:0;pointer-events:none;
}
.cursor{
  display:inline-block;width:2px;height:16px;
  background:#fff;margin-left:1px;vertical-align:text-bottom;
  animation:blink 0.9s ease infinite;
}
@keyframes blink{0%,100%{opacity:1}45%,55%{opacity:0}}
.tags-row{display:flex;align-items:center;gap:6px;overflow:hidden;padding-top:4px}
.tag-refresh{
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.tag{
  padding:5px 12px;border-radius:100px;
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.75);font-size:12px;white-space:nowrap;
}
.card-divider{height:1px;background:rgba(255,255,255,0.07);margin:12px 0}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.toggle-pill{
  display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:100px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.75);font-size:12px;
}
.check-circle{
  width:16px;height:16px;border-radius:50%;
  background:rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#fff;
}
.lyrics-btn{color:rgba(255,255,255,0.6);font-size:13px}
</style>
</head>
<body>
<div class="scale-root">
<div class="phone">
  <div class="dynamic-island"></div>
  <div class="screen-overlay" id="overlay"></div>
  <div class="annotation" id="annot"></div>

  <div class="status">
    <div class="status-time">1:47</div>
    <div style="width:80px"></div>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="white" opacity="0.9"><rect x="0" y="4" width="3" height="8" rx="0.5"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="0.5"/><rect x="9" y="0" width="3" height="12" rx="0.5"/><rect x="13.5" y="-1" width="2.5" height="13" rx="0.5" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="white" opacity="0.9"><path d="M8 2C10.8 2 13.3 3.1 15.1 5L14.1 6C12.5 4.4 10.4 3.4 8 3.4S3.5 4.4 1.9 6L.9 5C2.7 3.1 5.2 2 8 2z"/><path d="M8 5C9.9 5 11.6 5.8 12.9 7.1L11.9 8.1C10.8 7 9.5 6.4 8 6.4S5.2 7 4.1 8.1L3.1 7.1C4.4 5.8 6.1 5 8 5z"/><circle cx="8" cy="11" r="1.5"/></svg>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke="white" stroke-opacity="0.35"/><rect x="2" y="2" width="16" height="9" rx="2" fill="white"/><path d="M24 4.5v4a2 2 0 000-4z" fill="white" fill-opacity="0.4"/></svg>
    </div>
  </div>

  <div class="navbar">
    <div class="back-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round"><path d="M6 1L6 11M1 6l5 5 5-5"/></svg>
    </div>
    <div class="nav-center">
      <div class="nav-title">Simple ▾</div>
      <div class="nav-subtitle">50 credits</div>
    </div>
    <div class="model-pill">v4.5-all ▾</div>
  </div>

  <div class="content">
    <div class="audio-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 1v12M1 7h12"/></svg>
      Audio
    </div>
    <div class="song-card">
      <div class="card-header">
        <div class="card-title">Song Description</div>
        <div class="dice-btn" id="dice">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="1" width="13" height="13" rx="2.5" stroke="rgba(255,255,255,0.7)" stroke-width="1.2"/><circle cx="4.5" cy="4.5" r="1.1" fill="rgba(255,255,255,0.7)"/><circle cx="10.5" cy="4.5" r="1.1" fill="rgba(255,255,255,0.7)"/><circle cx="7.5" cy="7.5" r="1.1" fill="rgba(255,255,255,0.7)"/><circle cx="4.5" cy="10.5" r="1.1" fill="rgba(255,255,255,0.7)"/><circle cx="10.5" cy="10.5" r="1.1" fill="rgba(255,255,255,0.7)"/></svg>
        </div>
      </div>
      <div class="text-area">
        <div class="placeholder-text" id="placeholder">A heavy metal song about dinosaurs ruling again</div>
        <span class="typed-text" id="typed"></span><span class="cursor" id="cursor"></span>
        <div class="random-text" id="randomText"></div>
      </div>
      <div class="tags-row">
        <div class="tag-refresh"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.3" stroke-linecap="round"><path d="M2 6.5A4.5 4.5 0 0111 4M11 6.5A4.5 4.5 0 012 9"/><path d="M9.5 2.5L11 4l-1.5 1.5M3.5 10.5L2 9l1.5-1.5"/></svg></div>
        <div class="tag">dreamy</div>
        <div class="tag">gospel</div>
        <div class="tag">cinematic</div>
        <div class="tag">grunge</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-footer">
        <div class="toggle-pill"><div class="check-circle">✓</div>Instrumental</div>
        <div class="lyrics-btn">+ Lyrics</div>
      </div>
    </div>
  </div>
</div>
</div>

<script>
// Scale phone to fit iframe
function scaleToFit(){
  const s = Math.min(window.innerWidth/300, window.innerHeight/620) * 0.92;
  document.querySelector('.scale-root').style.transform = `scale(${s})`;
}
scaleToFit();
window.addEventListener('resize', scaleToFit);

const overlay    = document.getElementById('overlay');
const annot      = document.getElementById('annot');
const placeholder= document.getElementById('placeholder');
const typed      = document.getElementById('typed');
const randomText = document.getElementById('randomText');
const dice       = document.getElementById('dice');

const FADE = 400; // ms for all opacity transitions

function t(el, ms){ el.style.transition = `opacity ${ms}ms ease, background ${ms}ms ease`; }
function delay(ms){ return new Promise(r => setTimeout(r, ms)); }

// Show overlay + annotation together
async function showAnnot(msg){
  annot.textContent = msg;
  t(overlay, FADE); t(annot, FADE);
  overlay.style.background = 'rgba(0,0,0,0.72)';
  annot.style.opacity = '1';
}
async function hideAnnot(){
  t(overlay, FADE); t(annot, FADE);
  overlay.style.background = 'rgba(0,0,0,0)';
  annot.style.opacity = '0';
  await delay(FADE + 60);
}

function setOpacity(el, val, duration){
  el.style.transition = `opacity ${duration}ms ease`;
  el.style.opacity = val;
}

// Type / delete
function typeChars(text, speed, i, done){
  typed.textContent = text.slice(0, i);
  if(i < text.length) setTimeout(() => typeChars(text, speed, i+1, done), speed);
  else done && done();
}
function deleteChars(speed, done){
  const s = typed.textContent;
  if(!s.length){ done && done(); return; }
  typed.textContent = s.slice(0, -1);
  setTimeout(() => deleteChars(speed, done), speed);
}

async function tapDice(){
  dice.style.transition = 'transform 0.1s, opacity 0.1s';
  dice.style.transform = 'scale(0.82)';
  dice.style.opacity = '0.55';
  await delay(130);
  dice.style.transform = '';
  dice.style.opacity = '';
  dice.classList.add('spinning');
  await delay(580);
  dice.classList.remove('spinning');
}

async function runLoop(){
  // ── INSTANT RESET (no transitions) ──
  overlay.style.transition = 'none';
  annot.style.transition   = 'none';
  placeholder.style.transition = 'none';
  randomText.style.transition  = 'none';

  overlay.style.background = 'rgba(0,0,0,0)';
  annot.style.opacity      = '0';
  annot.textContent        = '';
  placeholder.style.opacity = '1';
  randomText.style.opacity  = '0';
  randomText.textContent    = '';
  typed.textContent         = '';

  // Force reflow so resets apply before any transitions fire
  void overlay.offsetWidth;

  // ── PHASE 1: blank field → annotate ──
  await delay(1000);
  await showAnnot('Empty field — where do I even start?');
  await delay(1600);
  await hideAnnot();

  // ── PHASE 2: user tries to type, gives up ──
  setOpacity(placeholder, '0', 250);
  await delay(300);
  await new Promise(r => typeChars('I want a song about...', 68, 0, r));
  await delay(650);
  await new Promise(r => deleteChars(48, r));

  // ── PHASE 3: tap dice → first random prompt ──
  setOpacity(placeholder, '1', 200);
  await delay(450);
  await tapDice();

  setOpacity(placeholder, '0', 200);
  await delay(220);
  randomText.textContent = 'A heavy metal song about dinosaurs ruling again';
  setOpacity(randomText, '1', FADE);
  await delay(FADE + 600);

  await showAnnot('Random ≠ personal. This isn\'t about me.');
  await delay(1800);
  await hideAnnot();

  // ── PHASE 4: tap dice → second random prompt ──
  setOpacity(randomText, '0', 300);
  await delay(380);
  await tapDice();

  randomText.textContent = 'A dubstep song about travelling to space';
  setOpacity(randomText, '1', FADE);
  await delay(FADE + 600);

  await showAnnot('Random ≠ personal. This isn\'t about me.');
  await delay(1800);
  await hideAnnot();

  await delay(600);
  runLoop();
}

setTimeout(runLoop, 700);
</script>
</body>
</html>
